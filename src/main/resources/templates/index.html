<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도서 관리 시스템</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>도서 관리 시스템</h1>
            <div class="auth-buttons" style="margin-top: 10px; text-align: right;">
                <!-- 로그인 안 했을 때 -->
                <a th:if="${user == null}" href="/login" style="color: white; text-decoration: none; margin-right: 10px; font-weight: bold;">로그인</a>

                <!-- 로그인 했을 때 -->
                <div th:if="${user != null}" style="display: inline;">
                    <span style="color: white; margin-right: 10px;" th:text="|${user.name}님 환영합니다.|"></span>
                    <form action="/api/users/logout" method="post" style="display: inline;">
                        <button type="submit" style="padding: 5px 10px; background-color: #dc3545; font-size: 0.9em;">로그아웃</button>
                    </form>
                </div>
            </div>
        </header>

        <main>
            <!-- User Management Section -->
            <section id="user-section">
                <h2>회원 관리</h2>
                <!-- 회원 등록 폼 제거됨 -->
                <h3>회원 목록</h3>
                <table id="userTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>이름</th>
                            <th>등급</th>
                            <th th:if="${user != null && user.role == 'admin'}">관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- User rows will be populated here -->
                    </tbody>
                </table>
            </section>

            <hr>

            <!-- Book Management Section -->
            <section id="book-section">
                <h2>도서 관리</h2>
                <div class="form-group">
                    <input type="text" id="searchTitle" placeholder="도서 제목 검색">
                    <button onclick="searchBooks()">검색</button>
                    <button onclick="loadBooks()">전체 목록 새로고침</button>
                </div>
                <h3>도서 목록</h3>
                <table id="bookTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>카테고리</th>
                            <th>제목</th>
                            <th>상태</th>
                            <th th:if="${user != null && user.role == 'admin'}">반납 예정일</th>
                            <th th:if="${user != null && user.role == 'admin'}">대출자 ID</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Book rows will be populated here -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <script th:inline="javascript">
        var currentUserRole = /*[[${user != null ? user.role : 'guest'}]]*/ 'guest';
    </script>
    <script src="/app.js"></script>
</body>
</html>
